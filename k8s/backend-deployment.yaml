apiVersion: apps/v1
kind: Deployment
metadata:
  name: stock-forecast-backend
  labels:
    app: stock-forecast-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stock-forecast-backend
  template:
    metadata:
      labels:
        app: stock-forecast-backend
    spec:
      containers:
        - name: backend
          image: calvarado2004/stock-forecast-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: stock-forecast-backend-secrets
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: stock-forecast-backend
  labels:
    app: stock-forecast-backend
spec:
  type: ClusterIP
  selector:
    app: stock-forecast-backend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
