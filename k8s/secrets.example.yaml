apiVersion: v1
kind: Secret
metadata:
  name: stock-forecast-db-secrets
type: Opaque
stringData:
  POSTGRES_USER: 'postgres'
  POSTGRES_PASSWORD: 'change-me-superuser-password'
  POSTGRES_DB: 'postgres'
  APP_DB_USER: 'stockuser'
  APP_DB_PASSWORD: 'change-me-app-password'
  APP_DB_NAME: 'stock_forecast'
---
apiVersion: v1
kind: Secret
metadata:
  name: stock-forecast-backend-secrets
type: Opaque
stringData:
  PORT: "8080"
  DB_DRIVER: 'postgres'
  DB_DSN: 'host=stock-forecast-db port=5432 user=stockuser password=change-me-app-password dbname=stock_forecast sslmode=disable TimeZone=UTC'
  ALPHA_API_KEY: ""
  SEC_USER_AGENT: "stock-forecast-terminal/1.0 (admin@example.com)"
  ML_SERVICE_URL: "stock-forecast-ml-engine:8083"
  ML_SERVICE_PUSH_PATH: "/ingest"
  ML_SERVICE_STATUS_PATH: "/jobs/{job_id}"
  ML_SERVICE_API_KEY: "replace-with-your-api-key"
  ML_SERVICE_TIMEOUT_MS: "10000"
---
apiVersion: v1
kind: Secret
metadata:
  name: stock-forecast-db-init
type: Opaque
stringData:
  01-init-db.sh: |
    #!/bin/sh
    set -eu
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
      SELECT format('CREATE ROLE %I LOGIN PASSWORD %L', '${APP_DB_USER}', '${APP_DB_PASSWORD}')
      WHERE NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = '${APP_DB_USER}') \gexec

      SELECT format('CREATE DATABASE %I OWNER %I', '${APP_DB_NAME}', '${APP_DB_USER}')
      WHERE NOT EXISTS (SELECT 1 FROM pg_database WHERE datname = '${APP_DB_NAME}') \gexec

      SELECT format('GRANT ALL PRIVILEGES ON DATABASE %I TO %I', '${APP_DB_NAME}', '${APP_DB_USER}') \gexec
    EOSQL
