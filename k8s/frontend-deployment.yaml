apiVersion: apps/v1
kind: Deployment
metadata:
  name: stock-forecast-frontend
  labels:
    app: stock-forecast-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stock-forecast-frontend
  template:
    metadata:
      labels:
        app: stock-forecast-frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
      containers:
        - name: frontend
          image: calvarado2004/stock-forecast-frontend:latest
          imagePullPolicy: Always
          env:
            - name: API_UPSTREAM
              value: stock-forecast-backend:8080
          ports:
            - containerPort: 80
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: nginx-conf-d
              mountPath: /etc/nginx/conf.d
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: nginx-tmp
              mountPath: /tmp
      volumes:
        - name: nginx-conf-d
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: nginx-tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: stock-forecast-frontend
  labels:
    app: stock-forecast-frontend
spec:
  type: LoadBalancer
  selector:
    app: stock-forecast-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
