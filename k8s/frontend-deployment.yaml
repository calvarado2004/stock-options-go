apiVersion: apps/v1
kind: Deployment
metadata:
  name: stock-forecast-frontend
  labels:
    app: stock-forecast-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stock-forecast-frontend
  template:
    metadata:
      labels:
        app: stock-forecast-frontend
    spec:
      containers:
        - name: frontend
          image: calvarado2004/stock-forecast-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: stock-forecast-frontend
  labels:
    app: stock-forecast-frontend
spec:
  type: LoadBalancer
  selector:
    app: stock-forecast-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
