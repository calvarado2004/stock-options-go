apiVersion: v1
kind: Service
metadata:
  name: stock-forecast-db
  labels:
    app: stock-forecast-db
spec:
  type: ClusterIP
  selector:
    app: stock-forecast-db
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: stock-forecast-db-headless
  labels:
    app: stock-forecast-db
spec:
  clusterIP: None
  selector:
    app: stock-forecast-db
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: stock-forecast-db
  labels:
    app: stock-forecast-db
spec:
  serviceName: stock-forecast-db-headless
  replicas: 1
  selector:
    matchLabels:
      app: stock-forecast-db
  template:
    metadata:
      labels:
        app: stock-forecast-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: stock-forecast-db-secrets
          startupProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
      volumes:
        - name: init-sql
          secret:
            secretName: stock-forecast-db-init
            defaultMode: 0555
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: px-csi-db
        resources:
          requests:
            storage: 10Gi
