apiVersion: v1
kind: Service
metadata:
  name: stock-forecast-db
  labels:
    app: stock-forecast-db
spec:
  clusterIP: None
  selector:
    app: stock-forecast-db
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: stock-forecast-db
  labels:
    app: stock-forecast-db
spec:
  serviceName: stock-forecast-db
  replicas: 1
  selector:
    matchLabels:
      app: stock-forecast-db
  template:
    metadata:
      labels:
        app: stock-forecast-db
    spec:
      containers:
        - name: sqlite-holder
          image: alpine:3.20
          command: ["/bin/sh", "-c", "mkdir -p /data && touch /data/stock_data.db && tail -f /dev/null"]
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: px-csi-db
        resources:
          requests:
            storage: 10Gi
