services:
  db:
    image: postgres:16-alpine
    container_name: stock-options-db
    environment:
      POSTGRES_DB: stock_forecast
      POSTGRES_USER: stockuser
      POSTGRES_PASSWORD: stockpass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockuser -d stock_forecast"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - stock_pg_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: stock-options-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: "8080"
      DB_DRIVER: postgres
      DB_DSN: host=db port=5432 user=stockuser password=stockpass dbname=stock_forecast sslmode=disable TimeZone=UTC
      DB_PATH: ""
      ALPHA_API_KEY: ${ALPHA_API_KEY:-}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: stock-options-frontend
    depends_on:
      - backend
    environment:
      API_UPSTREAM: backend:8080
    ports:
      - "${FRONTEND_PORT:-5173}:8080"
    restart: unless-stopped

volumes:
  stock_pg_data:
